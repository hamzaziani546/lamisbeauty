name: Deploy Backend

on:
  push:
    branches: [master]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/lamisbeauty-backend:latest
            ghcr.io/${{ github.repository_owner }}/lamisbeauty-backend:${{ github.sha }}

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "--- Logging into GHCR ---"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            echo "--- Pulling new image ---"
            docker pull ghcr.io/${{ github.repository_owner }}/lamisbeauty-backend:latest

            echo "--- Finding and restarting backend container ---"
            CONTAINER=$(docker ps --filter "name=backend" --format "{{.Names}}" | head -1)

            if [ -n "$CONTAINER" ]; then
              echo "Found container: $CONTAINER"
              # Get the docker-compose project directory
              COMPOSE_DIR=$(docker inspect "$CONTAINER" --format '{{ index .Config.Labels "com.docker.compose.project.working_dir" }}' 2>/dev/null)

              if [ -n "$COMPOSE_DIR" ] && [ -f "$COMPOSE_DIR/docker-compose.yml" ]; then
                echo "Using docker compose in $COMPOSE_DIR"
                cd "$COMPOSE_DIR"
                git pull origin master
                docker compose up -d --build backend
              else
                echo "Restarting standalone container"
                docker stop "$CONTAINER"
                docker rm "$CONTAINER"
                # Recreate with same settings
                docker run -d \
                  --name "$CONTAINER" \
                  --env-file /opt/lamisbeauty/backend/.env \
                  --network $(docker inspect "$CONTAINER" --format '{{range $k, $v := .NetworkSettings.Networks}}{{$k}}{{end}}' 2>/dev/null || echo "bridge") \
                  -p 8000:8000 \
                  --restart unless-stopped \
                  ghcr.io/${{ github.repository_owner }}/lamisbeauty-backend:latest
              fi
            else
              echo "No running backend container found. Pulling code and using docker compose..."
              cd /opt/lamisbeauty || cd /root/lamisbeauty || { echo "Cannot find project directory"; exit 1; }
              git pull origin master
              docker compose up -d --build backend
            fi

            echo "--- Deploy complete ---"
            docker ps --filter "name=backend"
